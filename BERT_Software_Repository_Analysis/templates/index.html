<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BERT Bug Analysis System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="background"></div>

<div class="card">
    <div style="position: relative; z-index: 1;">
        <h1>BERT Pattern Recognition Engine</h1>
        <p class="subtitle">
            AI-powered automated analysis of software repository issues using advanced NLP embeddings
        </p>

        <form method="POST">
            <label for="bug-input">🔍 Enter Bug Report, Error Log, or Commit Message</label>
            <textarea 
                id="bug-input"
                name="text" 
                placeholder="Example: Application crashes when clicking submit button on profile page..." 
                required
            ></textarea>

            <button type="submit">Analyze & Classify 🚀</button>
        </form>
    </div>
</div>

</body>
</html>
